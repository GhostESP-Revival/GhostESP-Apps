name: Build and Deploy to R2

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

  workflow_dispatch:

env:
  R2_BUCKET: ghostesp-marketplace
  R2_PUBLIC_URL: https://gesp.fuckyourcdn.com
  GHOSTESP_REPO: https://github.com/GhostESP-Revival/GhostESP.git
  GHOSTESP_BRANCH: two-point-zero

jobs:
  build-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ghostbt
        run: pip install ghostbt

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.ghostbt/esp-idf
            ~/.espressif
          key: esp-idf-v6.0.1-tools

      - name: Install ESP-IDF
        run: |
          gbt setup
          ~/.ghostbt/esp-idf/install.sh esp32 esp32s2 esp32s3 esp32c5 esp32c6

      - name: Cache GhostESP firmware
        uses: actions/cache@v4
        with:
          path: ghostesp-firmware
          key: ghostesp-firmware-${{ env.GHOSTESP_BRANCH }}

      - name: Clone GhostESP firmware
        run: |
          if [ ! -d "ghostesp-firmware/components" ]; then
            git clone --depth=1 -b ${{ env.GHOSTESP_BRANCH }} ${{ env.GHOSTESP_REPO }} ghostesp-firmware
          fi

      - name: Build and upload apps
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          import json
          import subprocess
          import os
          import glob
          import shutil

          r2_bucket = os.environ['R2_BUCKET']
          r2_url = os.environ['R2_PUBLIC_URL']
          r2_endpoint = os.environ['R2_ENDPOINT']
          firmware_dir = os.path.abspath('ghostesp-firmware')

          for manifest_path in glob.glob('apps/*/manifest.json'):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'app':
                  continue

              app_id = manifest['id']
              version = manifest['version']
              targets = manifest.get('targets', ['esp32s3'])
              source_repo = manifest.get('source_repo', '')
              source_branch = manifest.get('source_branch', 'main')
              source_subdir = manifest.get('source_subdir', '.')

              if not source_repo:
                  print(f"Skipping {app_id}: no source_repo")
                  continue

              # Normalize URLs for comparison (strip .git suffix and trailing slashes)
              def normalize_url(url):
                  return url.rstrip('/').removesuffix('.git')

              source_repo_norm = normalize_url(source_repo)
              firmware_repo_norm = normalize_url(os.environ.get('GHOSTESP_REPO', ''))

              # Determine source directory
              if source_repo_norm == firmware_repo_norm:
                  # Build from firmware tree
                  source_dir = os.path.join(firmware_dir, source_subdir)
                  print(f"Using firmware tree: {source_dir}")
              else:
                  # Clone external repo
                  clone_dir = f'sources/{app_id}'
                  if os.path.isdir(clone_dir):
                      shutil.rmtree(clone_dir)
                  print(f"Cloning {source_repo} at {source_branch}...")
                  result = subprocess.run(
                      ['git', 'clone', '--depth=1', '-b', source_branch, source_repo, clone_dir],
                      capture_output=True, text=True
                  )
                  if result.returncode != 0:
                      print(f"Clone failed for {app_id}: {result.stderr}")
                      continue
                  source_dir = os.path.join(clone_dir, source_subdir) if source_subdir != '.' else clone_dir

              if not os.path.isdir(source_dir):
                  print(f"Skipping {app_id}: source dir not found: {source_dir}")
                  continue

              # Upload preview image if specified
              preview_file = manifest.get('preview', '')
              if preview_file:
                  preview_path = os.path.join(source_dir, preview_file)
                  if os.path.isfile(preview_path):
                      r2_key = f"apps/{app_id}/{preview_file}"
                      subprocess.run([
                          'aws', 's3', 'cp', preview_path, f"s3://{r2_bucket}/{r2_key}",
                          '--endpoint-url', r2_endpoint,
                          '--content-type', 'image/png'
                      ], check=True)
                      print(f"Uploaded preview: {r2_url}/{r2_key}")

              # Clean build artifacts and stale sdkconfig to ensure fresh build
              build_dir = os.path.join(source_dir, 'build')
              if os.path.isdir(build_dir):
                  shutil.rmtree(build_dir)
              for f in ('sdkconfig', 'sdkconfig.old'):
                  p = os.path.join(source_dir, f)
                  if os.path.isfile(p):
                      os.remove(p)
                      print(f"Removed stale {f}")

              # Debug: show sdkconfig.defaults
              sdkconfig_defaults = os.path.join(source_dir, 'sdkconfig.defaults')
              if os.path.isfile(sdkconfig_defaults):
                  print(f"Found sdkconfig.defaults at {sdkconfig_defaults}")
                  with open(sdkconfig_defaults) as sf:
                      for line in sf:
                          if 'ELF_DYNAMIC' in line or 'SPIRAM' in line:
                              print(f"  {line.rstrip()}")
              else:
                  print(f"WARNING: No sdkconfig.defaults found at {sdkconfig_defaults}")

              for target in targets:
                  print(f"\n{'='*60}")
                  print(f"Building {app_id} v{version} for {target}...")
                  print(f"{'='*60}")
                  result = subprocess.run(
                      ['gbt', 'dist', '--target', target, '--gapp', '--out', f'build/{app_id}', source_dir]
                  )
                  if result.returncode != 0:
                      print(f"Build failed for {app_id}/{target}")
                      # Debug: show what was produced
                      if os.path.isdir(build_dir):
                          print(f"Build dir contents:")
                          for f in os.listdir(build_dir):
                              if f.endswith(('.bin', '.so', '.elf')):
                                  print(f"  {f}")
                      continue

                  gapp_files = glob.glob(f'build/{app_id}/**/*.gapp', recursive=True)
                  for gapp in gapp_files:
                      filename = os.path.basename(gapp)
                      r2_key = f"apps/{app_id}/v{version}/{filename}"

                      subprocess.run([
                          'aws', 's3', 'cp', gapp, f"s3://{r2_bucket}/{r2_key}",
                          '--endpoint-url', r2_endpoint,
                          '--content-type', 'application/octet-stream'
                      ], check=True)

                      print(f"Uploaded: {r2_url}/{r2_key}")
        shell: python

  regenerate-catalog:
    needs: build-apps
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json
        run: |
          import json
          import os
          import glob
          from datetime import datetime, timezone

          r2_url = os.environ['R2_PUBLIC_URL']

          catalog = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'apps': []
          }

          for manifest_path in sorted(glob.glob('apps/*/manifest.json')):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'app':
                  continue

              app_id = manifest['id']
              version = manifest['version']
              targets = manifest.get('targets', [])
              preview_file = manifest.get('preview', '')

              downloads = {}
              for target in targets:
                  filename = f"{app_id}-{version}-{target}.gapp"
                  downloads[target] = f"{r2_url}/apps/{app_id}/v{version}/{filename}"

              entry = {
                  'id': app_id,
                  'name': manifest['name'],
                  'version': version,
                  'authors': manifest.get('authors', ['Unknown']),
                  'category': manifest.get('category', 'Uncategorized'),
                  'description': manifest.get('description', ''),
                  'targets': targets,
                  'downloads': downloads,
                  'license': manifest.get('license', ''),
                  'changelog': manifest.get('changelog', ''),
                  'preview': f"{r2_url}/apps/{app_id}/{preview_file}" if preview_file else '',
                  'reviewed': manifest.get('reviewed', False)
              }
              catalog['apps'].append(entry)

          with open('catalog.json', 'w') as f:
              json.dump(catalog, f, indent=2)

          print(f"Generated catalog.json with {len(catalog['apps'])} apps")
        shell: python
        env:
          R2_PUBLIC_URL: ${{ env.R2_PUBLIC_URL }}

      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "chore: regenerate catalog.json [skip ci]"
          git pull --rebase origin main
          git push
