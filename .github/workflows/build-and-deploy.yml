name: Build and Deploy to R2

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'assets/**'

  workflow_dispatch:

env:
  R2_BUCKET: ghostesp-marketplace
  R2_PUBLIC_URL: https://gesp.fuckyourcdn.com

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
      assets: ${{ steps.changes.outputs.assets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          APPS=$(git diff --name-only HEAD~1 HEAD -- 'apps/**/manifest.json' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          ASSETS=$(git diff --name-only HEAD~1 HEAD -- 'assets/**/manifest.json' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "assets=$ASSETS" >> "$GITHUB_OUTPUT"

  build-apps:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ghostbt
        run: pip install ghostbt

      - name: Configure AWS credentials for R2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Build and upload apps
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          import json
          import subprocess
          import os
          import glob

          r2_bucket = os.environ['R2_BUCKET']
          r2_url = os.environ['R2_PUBLIC_URL']
          r2_endpoint = os.environ['R2_ENDPOINT']

          # Find all app manifests
          for manifest_path in glob.glob('apps/*/manifest.json'):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'app':
                  continue

              app_id = manifest['id']
              version = manifest['version']
              targets = manifest.get('targets', ['esp32s3'])
              source_dir = os.path.join(os.path.dirname(manifest_path), 'source')

              if not os.path.isdir(source_dir):
                  print(f"Skipping {app_id}: no source directory")
                  continue

              for target in targets:
                  print(f"Building {app_id} v{version} for {target}...")
                  result = subprocess.run(
                      ['gbt', 'dist', '--target', target, '--gapp', '--out', f'build/{app_id}', source_dir],
                      capture_output=True, text=True
                  )
                  if result.returncode != 0:
                      print(f"Build failed for {app_id}/{target}: {result.stderr}")
                      continue

                  # Find the .gapp file
                  gapp_files = glob.glob(f'build/{app_id}/**/*.gapp', recursive=True)
                  for gapp in gapp_files:
                      filename = os.path.basename(gapp)
                      r2_key = f"apps/{app_id}/v{version}/{filename}"

                      # Upload to R2
                      subprocess.run([
                          'aws', 's3', 'cp', gapp, f"s3://{r2_bucket}/{r2_key}",
                          '--endpoint-url', r2_endpoint,
                          '--content-type', 'application/octet-stream'
                      ], check=True)

                      print(f"Uploaded: {r2_url}/{r2_key}")
        shell: python

  build-assets:
    needs: detect-changes
    if: needs.detect-changes.outputs.assets != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ghostbt
        run: pip install ghostbt

      - name: Configure AWS credentials for R2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Build and upload assets
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          import json
          import subprocess
          import os
          import glob

          r2_bucket = os.environ['R2_BUCKET']
          r2_url = os.environ['R2_PUBLIC_URL']
          r2_endpoint = os.environ['R2_ENDPOINT']

          # Find all asset manifests
          for manifest_path in glob.glob('assets/*/manifest.json'):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'asset':
                  continue

              asset_id = manifest['id']
              source_dir = os.path.join(os.path.dirname(manifest_path), 'source')

              if not os.path.isdir(source_dir):
                  print(f"Skipping {asset_id}: no source directory")
                  continue

              print(f"Building asset pack: {asset_id}...")
              result = subprocess.run(
                  ['gbt', 'asset', 'pack', '--archive', '--out', f'build/assets/{asset_id}', source_dir],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"Build failed for {asset_id}: {result.stderr}")
                  continue

              # Find the .gtheme file
              gtheme_files = glob.glob(f'build/assets/{asset_id}/**/*.gtheme', recursive=True)
              for gtheme in gtheme_files:
                  filename = os.path.basename(gtheme)
                  r2_key = f"assets/{asset_id}/{filename}"

                  subprocess.run([
                      'aws', 's3', 'cp', gtheme, f"s3://{r2_bucket}/{r2_key}",
                      '--endpoint-url', r2_endpoint,
                      '--content-type', 'application/octet-stream'
                  ], check=True)

                  print(f"Uploaded: {r2_url}/{r2_key}")
        shell: python

  regenerate-catalog:
    needs: [build-apps, build-assets]
    if: always() && (needs.build-apps.result == 'success' || needs.build-assets.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json
        run: |
          import json
          import os
          import glob
          from datetime import datetime, timezone

          r2_url = os.environ['R2_PUBLIC_URL']

          catalog = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'apps': [],
              'assets': []
          }

          # Process apps
          for manifest_path in sorted(glob.glob('apps/*/manifest.json')):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'app':
                  continue

              app_id = manifest['id']
              version = manifest['version']
              targets = manifest.get('targets', [])

              downloads = {}
              for target in targets:
                  filename = f"{app_id}-{version}-{target}.gapp"
                  downloads[target] = f"{r2_url}/apps/{app_id}/v{version}/{filename}"

              entry = {
                  'id': app_id,
                  'name': manifest['name'],
                  'version': version,
                  'authors': manifest.get('authors', ['Unknown']),
                  'category': manifest.get('category', 'Uncategorized'),
                  'description': manifest.get('description', ''),
                  'targets': targets,
                  'downloads': downloads,
                  'license': manifest.get('license', ''),
                  'changelog': manifest.get('changelog', ''),
                  'reviewed': manifest.get('reviewed', False)
              }
              catalog['apps'].append(entry)

          # Process assets
          for manifest_path in sorted(glob.glob('assets/*/manifest.json')):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'asset':
                  continue

              asset_id = manifest['id']
              filename = f"{asset_id}.gtheme"

              entry = {
                  'id': asset_id,
                  'name': manifest['name'],
                  'version': manifest.get('version', '1'),
                  'authors': manifest.get('authors', ['Unknown']),
                  'category': manifest.get('category', 'Theme'),
                  'type': manifest.get('type', 'asset'),
                  'description': manifest.get('description', ''),
                  'contents': manifest.get('contents', []),
                  'file': filename,
                  'url': f"{r2_url}/assets/{asset_id}/{filename}",
                  'reviewed': manifest.get('reviewed', False)
              }
              catalog['assets'].append(entry)

          with open('catalog.json', 'w') as f:
              json.dump(catalog, f, indent=2)

          print(f"Generated catalog.json with {len(catalog['apps'])} apps and {len(catalog['assets'])} assets")
        shell: python
        env:
          R2_PUBLIC_URL: ${{ env.R2_PUBLIC_URL }}

      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "chore: regenerate catalog.json [skip ci]"
          git push
