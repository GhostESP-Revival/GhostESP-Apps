name: Validate Manifests

on:
  pull_request:
    paths:
      - 'apps/**/manifest.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate changed manifests
        run: |
          import json
          import sys
          import os
          import re

          required_fields = ['id', 'name', 'version', 'authors', 'category', 'description', 'type', 'targets', 'license', 'source_repo', 'source_branch', 'source_subdir']

          valid_categories = ['System', 'Tools', 'Games', 'Bluetooth', 'GPIO', 'Infrared', 'Media', 'NFC', 'RFID', 'Sub-GHz', 'USB']
          valid_targets = ['esp32', 'esp32s2', 'esp32s3', 'esp32c5', 'esp32c6']

          errors = []

          for root, dirs, files in os.walk('apps'):
              if 'manifest.json' in files and root != 'apps':
                  path = os.path.join(root, 'manifest.json')
                  try:
                      with open(path) as f:
                          manifest = json.load(f)
                  except json.JSONDecodeError as e:
                      errors.append(f"{path}: Invalid JSON - {e}")
                      continue

                  for field in required_fields:
                      if field not in manifest:
                          errors.append(f"{path}: Missing required field '{field}'")

                  if manifest.get('type') != 'app':
                      errors.append(f"{path}: 'type' must be 'app'")

                  for target in manifest.get('targets', []):
                      if target not in valid_targets:
                          errors.append(f"{path}: Invalid target '{target}'")

                  if manifest.get('category', '') not in valid_categories:
                      errors.append(f"{path}: Invalid category '{manifest.get('category', '')}'")

                  if not isinstance(manifest.get('authors', []), list):
                      errors.append(f"{path}: 'authors' must be an array")

                  source_repo = manifest.get('source_repo', '')
                  if not re.match(r'https://github\.com/.+/.+', source_repo):
                      errors.append(f"{path}: 'source_repo' must be a valid GitHub URL")

          if errors:
              print("Validation failed:")
              for error in errors:
                  print(f"  - {error}")
              sys.exit(1)
          else:
              print("All manifests are valid.")
        shell: python
